<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Go File Share</title>
    <style>
        body { font-family: sans-serif; padding: 20px; max-width: 500px; margin: auto; }
        .upload-box { border: 2px dashed #ccc; padding: 20px; text-align: center; border-radius: 8px; }
        #link-container { margin-top: 20px; display: none; background: #eef; padding: 10px; border-radius: 4px; }
    </style>
</head>
<body>
    <h2>Share a File</h2>
    
    <div class="upload-box">
        <input type="file" id="fileInput" />
        <br><br>
        <button onclick="uploadFile()">Upload & Share</button>
    </div>

    <div id="link-container">
        <p><strong>Success! Share this link:</strong></p>
        <a id="downloadLink" href="#" target="_blank">Download Link</a>
    </div>

    <script>
        async function uploadFile() {
            const fileInput = document.getElementById('fileInput');
            const file = fileInput.files[0];
            
            if (!file) {
                alert("Please select a file first.");
                return;
            }

            // Create FormData to send the file
            const formData = new FormData();
            formData.append("myFile", file);

            try {
                // Send the POST request to the Go backend
                const response = await fetch('/upload', {
                    method: 'POST',
                    body: formData
                });

                if (response.ok) {
                    // Get the file URL returned by Go
                    const fileUrl = await response.text();
                    
                    // Show the link to the user
                    const linkContainer = document.getElementById('link-container');
                    const downloadLink = document.getElementById('downloadLink');
                    
                    downloadLink.href = fileUrl;
                    downloadLink.textContent = window.location.origin + fileUrl;
                    linkContainer.style.display = 'block';
                } else {
                    alert("Upload failed. Server returned an error.");
                }
            } catch (error) {
                console.error("Error:", error);
                alert("Network error occurred during upload.");
            }
        }
    </script>
</body>
</html>
