<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pupaflow Share</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background-color: #f4f4f5; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: white; padding: 2rem; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); width: 100%; max-width: 400px; text-align: center; }
        h1 { margin-top: 0; color: #18181b; }
        textarea, input { width: 90%; padding: 10px; margin: 10px 0; border: 1px solid #e4e4e7; border-radius: 6px; font-size: 16px; }
        button { background-color: #000; color: white; border: none; padding: 10px 20px; border-radius: 6px; font-size: 16px; cursor: pointer; width: 100%; }
        button:hover { background-color: #3f3f46; }
        .result { margin-top: 15px; font-weight: bold; color: #16a34a; font-size: 24px; letter-spacing: 2px;}
    </style>
</head>
<body>
    <div class="card">
        <h1>Share securely.</h1>
        <p>Paste a secret message or link below.</p>
        <form action="/share" method="POST">
            <textarea name="content" rows="4" placeholder="Enter text to share..." required></textarea>
            <button type="submit">Generate 6-Digit Code</button>
        </form>
        
        <hr style="margin: 20px 0; border: 0; border-top: 1px solid #e4e4e7;">
        
        <p>Have a code?</p>
        <form action="/get" method="GET">
            <input type="text" name="code" placeholder="Enter 6-digit code" maxlength="6" required>
            <button type="submit">Retrieve</button>
        </form>
    </div>
</body>
</html>
